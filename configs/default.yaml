project_root: /ssd/wyj/d2city_risk_mllm
d2city_root: /ssd/wyj/d2city

data:
  raw_index: data/raw_index.json
  frame_index: data/frame_index.json
  frames_dir: data/frames
  sft_jsonl: data/risk_sft.jsonl
  train_jsonl: data/train.jsonl
  val_jsonl: data/val.jsonl
  test_jsonl: data/test.jsonl
  vehicle_cache: data/vehicle_count_cache.json

frame_extraction:
  interval_sec: 5
  image_mode: symlink

sft:
  seed: 42
  question: 请结合交通监控画面和外部交通信息，判断当前路段的安全风险等级、异常事件类型，并给出原因分析和管理建议。
  yolo_model: yolov8n.pt
  yolo_conf: 0.25

split:
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  seed: 42

training:
  model_path: Qwen/Qwen2.5-VL-3B-Instruct
  output_dir: outputs/checkpoints/qwen_vl_lora
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0001
  max_pixels: 602112
  save_steps: 200
  logging_steps: 10
  gradient_checkpointing: true
